<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Année sabbatique – compte à rebours</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: "Montserrat", sans-serif;
        background: #0b0f19;
        color: #e8ecf6;
        overflow: hidden;
      }

      .slideshow-container {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
      }

      .slide {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 1s ease-in-out;
      }

      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
        text-align: center;
        position: relative;
        z-index: 2;
        padding: 20px;
        box-sizing: border-box;
      }

      .content {
        position: relative;
        z-index: 3;
        width: min(1350px, 96vw);
        padding: 28px 36px;
        background: rgba(11, 15, 25, 0.42);
        border-radius: 16px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(2px);
        box-sizing: border-box;
      }

      .title {
        font-size: clamp(32px, 6vw, 80px);
        font-weight: 600;
        margin-bottom: 16px;
        letter-spacing: 2px;
        text-align: left;
      }

      .timer {
        color: #ffd700;
        font-size: clamp(36px, 8vw, 120px);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        line-height: 1.08;
      }

      .t-unit {
        font-size: 0.28em;
        color: white;
        opacity: 0.8;
        text-transform: uppercase;
        letter-spacing: 3px;
        vertical-align: middle;
      }

      .stats {
        margin-top: 28px;
        display: grid;
        gap: 16px;
      }

      .stat-line {
        font-size: clamp(20px, 2vw, 30px);
        line-height: 1.4;
        overflow-wrap: anywhere;
      }

      .stat-line strong {
        color: #ffd700;
        font-size: clamp(26px, 3vw, 42px);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 700px) {
        .content {
          width: min(98vw, 98vw);
          padding: 20px 16px;
        }

        .stat-line {
          font-size: 18px;
        }

        .stat-line strong {
          font-size: 24px;
          display: inline-block;
          margin-top: 6px;
        }

        .t-unit {
          letter-spacing: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div class="slideshow-container">
      <img
        class="slide"
        src="florian-wehde-lY87gHWdGNo-unsplash.jpg"
        alt="Rue animée en Asie du Sud-Est"
      />
      <img
        class="slide"
        src="giuliano-gabella-S2aZq6yG-b4-unsplash.jpg"
        alt="Lagune turquoise en Asie du Sud-Est"
      />
      <img
        class="slide"
        src="guille-alvarez-P11Z-nILhCs-unsplash.jpg"
        alt="Pêcheur avec filet en Asie du Sud-Est"
      />
      <img class="slide" src="guilin.webp" alt="Paysage de Guilin" />
      <img
        class="slide"
        src="china-sunset-on-rice-fields.png"
        alt="Coucher de soleil sur les rizières en Chine"
      />
    </div>

    <div class="wrap">
      <div class="content">
        <div class="title">Année sabbatique dans...</div>
        <div id="timer" class="timer">--j --h --m --s</div>

        <div class="stats">
          <div class="stat-line">
            Temps de travail restant avant l’année sabbatique :
            <strong id="worktimeToSabbatical">--</strong>
          </div>

          <div class="stat-line">
            Reste à travailler avant le week-end :
            <strong id="weekendWorkCountdown">--</strong>
          </div>

          <div id="vacationLine" class="stat-line hidden">
            <span id="vacationLabel">Temps avant 0 jour de vacances :</span>
            <strong id="vacationCountdown">--</strong>
          </div>
        </div>
      </div>
    </div>

    <script>
      const TARGET = new Date(2026, 4, 31, 23, 59, 59);
      const WORK_END_HOUR = 18;
      const FULL_WORKDAY_MS = 24 * 60 * 60 * 1000;

      const PUBLIC_HOLIDAYS = new Set([
        "20260406",
        "20260501",
        "20260508",
        "20260514",
        "20260525",
      ]);

      // Périodes de congés payés posés
      const VACATION_PERIODS_RAW = [
        { start: "20260323", end: "20260327" },
        { start: "20260330", end: "20260403" },
        { start: "20260430", end: "20260507" },
      ];

      function parseKey(key) {
        const y = Number(key.slice(0, 4));
        const m = Number(key.slice(4, 6)) - 1;
        const d = Number(key.slice(6, 8));
        return new Date(y, m, d);
      }

      function formatYYYYMMDD(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}${m}${d}`;
      }

      function startOfDay(date) {
        const d = new Date(date);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function endOfWorkday(date) {
        const d = new Date(date);
        d.setHours(WORK_END_HOUR, 0, 0, 0);
        return d;
      }

      function addDays(date, days) {
        const d = new Date(date);
        d.setDate(d.getDate() + days);
        return d;
      }

      function isWeekend(date) {
        const day = date.getDay();
        return day === 0 || day === 6;
      }

      function isHoliday(date) {
        return PUBLIC_HOLIDAYS.has(formatYYYYMMDD(date));
      }

      function isNaturallyNonWorkingDay(date) {
        return isWeekend(date) || isHoliday(date);
      }

      function buildPersonalLeavesSet(periods) {
        const set = new Set();

        for (const period of periods) {
          const start = parseKey(period.start);
          const end = parseKey(period.end);

          for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
            set.add(formatYYYYMMDD(d));
          }
        }

        return set;
      }

      const PERSONAL_LEAVES_RAW = buildPersonalLeavesSet(VACATION_PERIODS_RAW);

      function isBusinessDay(date) {
        const key = formatYYYYMMDD(date);
        return (
          !isWeekend(date) &&
          !PUBLIC_HOLIDAYS.has(key) &&
          !PERSONAL_LEAVES.has(key)
        );
      }

      function periodPaidLeaveDays(period) {
        let count = 0;
        const start = parseKey(period.start);
        const end = parseKey(period.end);

        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          if (PERSONAL_LEAVES_RAW.has(formatYYYYMMDD(d))) {
            count++;
          }
        }

        return count;
      }

      function onlyNaturallyNonWorkingDaysBetween(endA, startB) {
        const from = addDays(parseKey(endA), 1);
        const to = addDays(parseKey(startB), -1);

        if (from > to) {
          return true;
        }

        for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
          if (!isNaturallyNonWorkingDay(d)) {
            return false;
          }
        }

        return true;
      }

      function mergeContinuousVacationPeriods(periods) {
        if (!periods.length) return [];

        const sorted = [...periods].sort((a, b) =>
          a.start.localeCompare(b.start)
        );

        const merged = [];
        let current = {
          start: sorted[0].start,
          end: sorted[0].end,
          paidLeaveDays: periodPaidLeaveDays(sorted[0]),
        };

        for (let i = 1; i < sorted.length; i++) {
          const next = sorted[i];

          if (onlyNaturallyNonWorkingDaysBetween(current.end, next.start)) {
            current.end = next.end > current.end ? next.end : current.end;
            current.paidLeaveDays += periodPaidLeaveDays(next);
          } else {
            merged.push(current);
            current = {
              start: next.start,
              end: next.end,
              paidLeaveDays: periodPaidLeaveDays(next),
            };
          }
        }

        merged.push(current);
        return merged;
      }

      const VACATION_BLOCKS = mergeContinuousVacationPeriods(
        VACATION_PERIODS_RAW
      );

      // Jours réellement non travaillés utilisés pour le calcul métier global
      const PERSONAL_LEAVES = buildPersonalLeavesSet(VACATION_BLOCKS);

      function formatDuration(ms) {
        if (ms <= 0) {
          return "0 jour 00h 00m 00s";
        }

        const totalSeconds = Math.floor(ms / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        return `${days} ${days > 1 ? "jours" : "jour"} ${String(hours).padStart(
          2,
          "0"
        )}h ${String(minutes).padStart(2, "0")}m ${String(seconds).padStart(
          2,
          "0"
        )}s`;
      }

      function formatMainCountdown(ms) {
        if (ms <= 0) {
          return `0 <span class="t-unit">jours</span> 00 <span class="t-unit">heures</span><br/>00 <span class="t-unit">minutes</span> 00 <span class="t-unit">secondes</span>`;
        }

        const totalSeconds = Math.floor(ms / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        return `${days} <span class="t-unit">jours</span> ${String(
          hours
        ).padStart(2, "0")} <span class="t-unit">heures</span><br/>${String(
          minutes
        ).padStart(2, "0")} <span class="t-unit">minutes</span> ${String(
          seconds
        ).padStart(2, "0")} <span class="t-unit">secondes</span>`;
      }

      function getLastWorkingMomentBeforeDate(date) {
        const d = startOfDay(date);
        d.setDate(d.getDate() - 1);

        while (true) {
          if (isBusinessDay(d)) {
            return endOfWorkday(d);
          }
          d.setDate(d.getDate() - 1);
        }
      }

      function getNextVacationInfo(now = new Date()) {
        for (const block of VACATION_BLOCKS) {
          const start = parseKey(block.start);
          const end = parseKey(block.end);

          if (startOfDay(start) <= now) {
            continue;
          }

          return {
            start,
            end,
            days: block.paidLeaveDays,
            lastWorkingMoment: getLastWorkingMomentBeforeDate(start),
          };
        }

        return null;
      }

      function getThisWeekFridayEnd(now = new Date()) {
        const day = now.getDay();
        const diffToFriday = 5 - day;

        if (diffToFriday < 0) {
          return null;
        }

        const friday = new Date(now);
        friday.setDate(now.getDate() + diffToFriday);
        friday.setHours(WORK_END_HOUR, 0, 0, 0);

        return friday;
      }

      function computeWorkRemainingUntil(stopAt, now = new Date()) {
        if (!stopAt || now >= stopAt) {
          return 0;
        }

        let total = 0;
        const today = startOfDay(now);
        const lastDay = startOfDay(stopAt);

        for (let d = new Date(today); d <= lastDay; d.setDate(d.getDate() + 1)) {
          if (!isBusinessDay(d)) {
            continue;
          }

          const isToday = startOfDay(d).getTime() === today.getTime();

          if (isToday) {
            const todayEnd = endOfWorkday(now);
            if (now < todayEnd) {
              total += todayEnd - now;
            }
          } else {
            total += FULL_WORKDAY_MS;
          }
        }

        return total;
      }

      function tick() {
        const now = new Date();

        const sabbaticalDiff = Math.max(0, TARGET - now);
        document.getElementById("timer").innerHTML =
          formatMainCountdown(sabbaticalDiff);

        const worktimeToSabbatical = computeWorkRemainingUntil(TARGET, now);
        document.getElementById("worktimeToSabbatical").textContent =
          formatDuration(worktimeToSabbatical);

        const fridayEnd = getThisWeekFridayEnd(now);
        let weekendWorkRemaining = 0;

        if (fridayEnd && now < fridayEnd && !isWeekend(now)) {
          weekendWorkRemaining = computeWorkRemainingUntil(fridayEnd, now);
        }

        document.getElementById("weekendWorkCountdown").textContent =
          formatDuration(weekendWorkRemaining);

        const nextVacation = getNextVacationInfo(now);
        const vacationLine = document.getElementById("vacationLine");

        if (nextVacation) {
          const remaining = computeWorkRemainingUntil(
            nextVacation.lastWorkingMoment,
            now
          );

          document.getElementById(
            "vacationLabel"
          ).textContent = `Temps avant ${nextVacation.days} ${
            nextVacation.days > 1 ? "jours" : "jour"
          } de vacances :`;

          document.getElementById("vacationCountdown").textContent =
            formatDuration(remaining);

          vacationLine.classList.remove("hidden");
        } else {
          vacationLine.classList.add("hidden");
        }
      }

      tick();
      setInterval(tick, 1000);

      const slides = document.querySelectorAll(".slide");
      let currentSlide = 0;

      function showSlide() {
        slides.forEach((slide, i) => {
          slide.style.opacity = i === currentSlide ? "1" : "0";
        });
        currentSlide = (currentSlide + 1) % slides.length;
      }

      showSlide();
      setInterval(showSlide, 5000);
    </script>
  </body>
</html>
